<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social MVP - Connect, Share, Engage</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: "Inter", sans-serif; }
        
        .view-container {
            display: none;
        }
        
        .view-container.active {
            display: block;
        }
        
        [data-nav].active {
            background-color: rgb(30 41 59);
            color: white;
        }
        
        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .animate-fade-in-up {
            animation: fadeInUp 0.3s ease-out;
        }
        
        @keyframes fadeOut {
            to {
                opacity: 0;
                transform: translateY(-10px);
            }
        }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: #1e293b;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #64748b;
        }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        slate: { 850: "#1a2332" }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-900 h-full overflow-hidden">
    
    <!-- Main Layout -->
    <div class="flex h-screen">
        
        <!-- Left Sidebar - Navigation -->
        <aside class="w-64 bg-slate-800 border-r border-slate-700 flex flex-col">
            <!-- Logo -->
            <div class="p-6 border-b border-slate-700">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg">
                        <svg class="w-6 h-6 text-white" fill="currentColor" viewBox="0 0 20 20">
                            <path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z"/>
                        </svg>
                    </div>
                    <h1 class="text-xl font-bold text-white">Social MVP</h1>
                </div>
            </div>
            
            <!-- Main Navigation -->
            <nav class="flex-1 p-4 overflow-y-auto">
                <div class="space-y-1">
                    <button data-nav="feed" class="nav-item active w-full flex items-center gap-3 px-4 py-3 rounded-lg text-slate-300 hover:bg-slate-700 transition-all">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
                        </svg>
                        <span class="font-semibold">Home Feed</span>
                    </button>
                    
                    <button data-nav="communities" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-lg text-slate-300 hover:bg-slate-700 transition-all">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/>
                        </svg>
                        <span class="font-semibold">Communities</span>
                    </button>
                    
                    <button data-nav="messages" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-lg text-slate-300 hover:bg-slate-700 transition-all">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
                        </svg>
                        <span class="font-semibold">Messages</span>
                        <span id="messageBadge" class="hidden ml-auto px-2 py-0.5 bg-blue-600 text-white text-xs font-bold rounded-full"></span>
                    </button>
                    
                    <button data-nav="notifications" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-lg text-slate-300 hover:bg-slate-700 transition-all">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
                        </svg>
                        <span class="font-semibold">Notifications</span>
                        <span id="notificationBadge" class="hidden ml-auto px-2 py-0.5 bg-red-600 text-white text-xs font-bold rounded-full">0</span>
                    </button>
                    
                    <button data-nav="profile" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-lg text-slate-300 hover:bg-slate-700 transition-all">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                        </svg>
                        <span class="font-semibold">Profile</span>
                    </button>
                </div>
                
                <!-- Create Button -->
                <button id="createPostBtn" class="w-full mt-4 px-4 py-3 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-full transition-all shadow-lg">
                    Create Post
                </button>
            </nav>
            
            <!-- User Menu -->
            <div class="p-4 border-t border-slate-700">
                <div class="flex items-center gap-3">
                    <img id="userAvatar" src="" alt="Your avatar" class="w-10 h-10 rounded-full object-cover">
                    <div class="flex-1 min-w-0">
                        <p id="userName" class="text-white font-semibold text-sm truncate">Loading...</p>
                        <p id="userHandle" class="text-slate-400 text-xs truncate">@user</p>
                    </div>
                    <button onclick="firebase.auth().signOut(); window.location.href='mvp-index.html';" 
                            class="text-slate-400 hover:text-white" title="Sign out">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                        </svg>
                    </button>
                </div>
            </div>
        </aside>
        
        <!-- Main Content Area -->
        <main class="flex-1 flex overflow-hidden">
            <!-- Center Content -->
            <div class="flex-1 flex flex-col overflow-hidden">
                <!-- Top Bar -->
                <header class="bg-slate-800 border-b border-slate-700 p-4">
                    <div class="flex items-center gap-4">
                        <!-- Search Bar -->
                        <div class="flex-1 max-w-md relative">
                            <input type="text" 
                                   id="globalSearch" 
                                   placeholder="Search users, communities, hashtags..." 
                                   class="w-full bg-slate-900 text-white placeholder-slate-500 rounded-full px-4 py-2 pl-10 border border-slate-700 focus:border-blue-500 focus:outline-none">
                            <svg class="w-5 h-5 text-slate-500 absolute left-3 top-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                            </svg>
                            
                            <!-- Search Results Dropdown -->
                            <div id="searchResults" class="hidden absolute top-full mt-2 w-full bg-slate-800 border border-slate-700 rounded-lg shadow-xl overflow-hidden z-50">
                            </div>
                        </div>
                        
                        <!-- Feed Algorithm Selector (visible on feed view) -->
                        <select id="feedAlgorithm" class="bg-slate-900 text-white px-4 py-2 rounded-lg border border-slate-700 focus:border-blue-500 focus:outline-none">
                            <option value="timeline">Latest</option>
                            <option value="trending">Trending</option>
                            <option value="following">Following</option>
                        </select>
                    </div>
                </header>
                
                <!-- Scrollable Content -->
                <div class="flex-1 overflow-y-auto p-6">
                    <!-- Feed View -->
                    <div id="feedView" class="view-container active">
                        <div class="max-w-2xl mx-auto">
                            <div id="feedContainer"></div>
                        </div>
                    </div>
                    
                    <!-- Communities View -->
                    <div id="communitiesView" class="view-container">
                        <div class="max-w-4xl mx-auto">
                            <!-- Community Tabs -->
                            <div class="flex gap-2 mb-6">
                                <button data-community-tab="discover" class="active px-4 py-2 bg-slate-800 text-white font-semibold rounded-lg border border-slate-700">
                                    Discover
                                </button>
                                <button data-community-tab="my" class="px-4 py-2 bg-slate-800 text-slate-400 font-semibold rounded-lg border border-slate-700 hover:text-white">
                                    My Communities
                                </button>
                            </div>
                            
                            <div id="communitiesContainer"></div>
                        </div>
                    </div>
                    
                    <!-- Messages View -->
                    <div id="messagesView" class="view-container">
                        <div id="messagesContainer" class="h-full"></div>
                    </div>
                    
                    <!-- Notifications View -->
                    <div id="notificationsView" class="view-container">
                        <div class="max-w-2xl mx-auto">
                            <div id="notificationsContainer"></div>
                        </div>
                    </div>
                    
                    <!-- Profile View -->
                    <div id="profileView" class="view-container">
                        <div class="max-w-2xl mx-auto">
                            <div id="profileContainer"></div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Right Sidebar - Widgets -->
            <aside class="w-80 bg-slate-850 border-l border-slate-700 overflow-y-auto p-4 hidden lg:block">
                <div id="sidebarRight" class="space-y-4">
                    <!-- Widgets will be loaded here dynamically -->
                </div>
            </aside>
        </main>
    </div>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.x/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.x/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.x/firebase-database-compat.js"></script>
    
    <!-- App Scripts -->
    <script src="js/config.js"></script>
    <script src="js/mvp-api.js"></script>
    <script src="js/mvp-ui-components.js"></script>
    <script src="js/mvp-app.js"></script>
    
    <script>
        // Update user info in sidebar
        firebase.auth().onAuthStateChanged(async (user) => {
            if (user) {
                const userData = (await firebase.database().ref(`users/${user.uid}`).once('value')).val();
                
                document.getElementById('userAvatar').src = userData?.avatar || user.photoURL || 
                    `https://ui-avatars.com/api/?name=${encodeURIComponent(user.email)}&size=200`;
                document.getElementById('userName').textContent = userData?.displayName || user.displayName || 'User';
                document.getElementById('userHandle').textContent = '@' + (userData?.username || user.email?.split('@')[0] || 'user');
            }
        });
        
        // Setup community tabs
        document.querySelectorAll('[data-community-tab]').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('[data-community-tab]').forEach(b => {
                    b.classList.remove('active', 'text-white');
                    b.classList.add('text-slate-400');
                });
                this.classList.add('active', 'text-white');
                this.classList.remove('text-slate-400');
                
                if (this.dataset.communityTab === 'discover') {
                    app.loadDiscoverCommunities();
                } else {
                    app.loadMyCommunities();
                }
            });
        });
        
        // Close search results when clicking outside
        document.addEventListener('click', (e) => {
            const searchInput = document.getElementById('globalSearch');
            const searchResults = document.getElementById('searchResults');
            
            if (searchResults && !searchResults.contains(e.target) && e.target !== searchInput) {
                searchResults.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
